<div>
    <button (click)="onSelectUser()">
        <!-- Need location + [] around property name and assign the value; only use string interpolation for attributes -->
        <img [src]="imagePath()" [alt]="name()" /> 
        <span>{{ name() }}</span> <!-- String interpolation {{}} to put the value of the expression into the template -->
    </button> <!-- Call signal value as a function using () -->
</div>
