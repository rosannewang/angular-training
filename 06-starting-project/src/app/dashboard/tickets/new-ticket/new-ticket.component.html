<form> <!--We don't want tp remove the form element because it's semantically significant (ex. forms, buttons, sections)-->
  <app-control class="control" label="Title">
    <input name="title" id="title" />
  </app-control>
  <app-control class="control" label="Request">
    <textarea name="request" id="request" rows="3"></textarea>
  </app-control>
  <p>
    <button appButton>
      Submit
      <span ngProjectAs="icon">⌲</span>
    </button>
  </p>
</form>
